{% extends 'core/base.html' %}
{% load humanize %}

{% block header_title %}System Logs{% endblock %}

{% block content %}
<div class="space-y-4 fade-up pb-8">

    <!-- ── FILTER TOOLBAR ────────────────────────────────────────────── -->
    <form hx-get="{% url 'core:system_logs' %}"
          hx-target="#log-feed-container"
          hx-push-url="true"
          hx-trigger="change, input delay:400ms"
          class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="flex flex-col md:flex-row items-stretch gap-0">

            <!-- Search -->
            <div class="flex items-center gap-3 flex-1 px-4 py-3 border-b md:border-b-0 md:border-r border-slate-100">
                <svg class="h-4 w-4 text-slate-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input type="text" name="q" value="{{ search_query|default:'' }}"
                       placeholder="Search activities…"
                       class="flex-1 bg-transparent border-0 focus:ring-0 text-sm text-slate-900 placeholder-slate-400 font-medium outline-none">
            </div>

            <!-- Action type -->
            <div class="px-4 py-3 border-b md:border-b-0 md:border-r border-slate-100 w-full md:w-52">
                <select name="action_type"
                        class="w-full bg-transparent border-0 focus:ring-0 text-sm text-slate-600 font-medium cursor-pointer outline-none appearance-none">
                    <option value="">All Action Types</option>
                    {% for code, label in action_types %}
                    <option value="{{ code }}" {% if selected_action == code %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Actor -->
            <div class="px-4 py-3 border-b md:border-b-0 md:border-r border-slate-100 w-full md:w-44">
                <select name="actor"
                        class="w-full bg-transparent border-0 focus:ring-0 text-sm text-slate-600 font-medium cursor-pointer outline-none appearance-none">
                    <option value="">All Members</option>
                    {% for actor in actors %}
                    <option value="{{ actor.id }}" {% if selected_actor == actor.id|stringformat:"s" %}selected{% endif %}>{{ actor.username }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Status indicator + refresh -->
            <div class="flex items-center justify-between gap-3 px-4 py-3">
                <div class="flex items-center gap-2">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest whitespace-nowrap">Live</span>
                </div>
                <button type="button" onclick="window.location.reload()"
                        class="p-2 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-lg transition-all" title="Refresh">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                </button>
            </div>
        </div>
    </form>

    <!-- ── LOG FEED ───────────────────────────────────────────────────── -->
    <div id="log-feed-container" class="relative min-h-[400px] bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
        {% include 'core/partials/log_rows.html' %}
    </div>
</div>
{% endblock %}
