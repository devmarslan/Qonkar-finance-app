{% extends 'core/base.html' %}
{% load humanize %}

{% block header_title %}System Logs{% endblock %}

{% block content %}
<div class="space-y-6 md:space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between px-2">
        <div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">System Activity</h1>
            <p class="mt-1 text-sm text-slate-500 font-medium tracking-wide">Real-time audit trail and event monitoring.</p>
        </div>
        <div class="mt-4 sm:mt-0 flex gap-2">
            <button onclick="window.location.reload()" class="inline-flex items-center px-4 py-2 bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg hover:bg-slate-50 transition-all active:scale-95 shadow-sm">
                <svg class="w-4 h-4 mr-2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                Refresh Feed
            </button>
        </div>
    </div>

    <!-- Filters Bar -->
    <div class="bg-white/70 backdrop-blur-xl rounded-lg border border-slate-200/60 p-4 shadow-sm">
        <form hx-get="{% url 'core:system_logs' %}" hx-target="#log-feed-container" hx-push-url="true" hx-trigger="change, input delay:500ms" class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <!-- Search -->
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                    <svg class="h-4 w-4 text-slate-400 group-focus-within:text-indigo-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" name="q" value="{{ search_query|default:'' }}" placeholder="Search activities..." 
                       class="block w-full pl-10 pr-4 py-2.5 bg-slate-50/50 border-slate-200/60 rounded-lg text-sm focus:bg-white focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all">
            </div>

            <!-- Action Type Filter -->
            <select name="action_type" class="block w-full px-4 py-2.5 bg-slate-50/50 border-slate-200/60 rounded-lg text-sm focus:bg-white focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all cursor-pointer">
                <option value="">All Action Types</option>
                {% for code, label in action_types %}
                    <option value="{{ code }}" {% if selected_action == code %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>

            <!-- Actor Filter -->
            <select name="actor" class="block w-full px-4 py-2.5 bg-slate-50/50 border-slate-200/60 rounded-lg text-sm focus:bg-white focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all cursor-pointer">
                <option value="">All Members</option>
                {% for actor in actors %}
                    <option value="{{ actor.id }}" {% if selected_actor == actor.id|stringformat:"s" %}selected{% endif %}>{{ actor.username }}</option>
                {% endfor %}
            </select>

            <!-- Status Indicator -->
            <div class="flex items-center px-4 bg-slate-50/50 rounded-lg border border-dashed border-slate-200/60">
                <div class="flex items-center gap-2">
                    <span class="flex h-2 w-2 relative">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Live Monitoring Active</span>
                </div>
            </div>
        </form>
    </div>

    <!-- Logs List -->
    <div id="log-feed-container" class="relative min-h-[500px]">
        {% include 'core/partials/log_rows.html' %}
    </div>
</div>

<style>
    .log-entry:last-child { border-bottom: none; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
</style>
{% endblock %}
