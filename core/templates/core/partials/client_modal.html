<div class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6" x-data="{ 
        show: true, 
        profilePreview: '{% if client.profile_picture %}{{ client.profile_picture.url }}{% endif %}',
        handleFileSelect(el) {
            const file = el.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => { this.profilePreview = e.target.result; };
                reader.readAsDataURL(file);
            }
        }
     }" x-show="show" x-on:keydown.escape.window="show = false" x-on:htmx:after-request="if(event.detail.successful) show = false">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-md transition-opacity" x-show="show" x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-transition:leave="ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" @click="show = false"></div>

    <!-- Modal Content -->
    <div class="relative bg-white rounded-lg shadow-2xl max-w-2xl w-full overflow-hidden transform transition-all border border-gray-100" x-show="show" x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95" x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100" x-transition:leave="ease-in duration-200" x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100" x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95">

        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-brand-600 to-indigo-600"></div>

        <div class="p-8 sm:p-12 overflow-y-auto max-h-[90vh]">
            <div class="flex items-center justify-between mb-10">
                <div>
                    <h3 class="text-3xl font-black text-gray-900 tracking-tight">
                        {% if client %}Profile Upgrade{% else %}Client Entry{% endif %}
                    </h3>
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mt-2">
                        {% if client %}Modifying system parameters for {{ client.name }}{% else %}Initialize new relationship record{% endif %}
                    </p>
                </div>
                <button @click="show = false" class="p-3 bg-gray-50 text-gray-400 hover:text-gray-900 rounded-lg transition-all border border-gray-100 hover:border-gray-200">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <form hx-post="{% if client %}{% url 'core:client_update' client.pk %}{% else %}{% url 'core:client_create' %}{% endif %}" hx-target="#client-table-container" hx-swap="outerHTML" hx-encoding="multipart/form-data" class="space-y-8">
                {% csrf_token %}

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Client Name -->
                    <div class="md:col-span-1">
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-3 ml-1">Identity Label (Name) *</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-gray-400 group-focus-within:text-brand-600 transition-colors">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                            </div>
                            <input type="text" name="name" value="{{ client.name|default:'' }}" required class="block w-full pl-12 pr-4 border-transparent bg-gray-50 rounded-lg focus:bg-white focus:ring-4 focus:ring-brand-500/10 text-sm font-bold py-4.5 transition-all outline-none border border-gray-100 focus:border-brand-500" placeholder="Organization or Individual Name">
                        </div>
                    </div>

                    <!-- Company Name -->
                    <div class="md:col-span-1">
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-3 ml-1">Organization Unit (Optional)</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-gray-400 group-focus-within:text-amber-600 transition-colors">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                                </svg>
                            </div>
                            <input type="text" name="company_name" value="{{ client.company_name|default:'' }}" class="block w-full pl-12 pr-4 border-transparent bg-gray-50 rounded-lg focus:bg-white focus:ring-4 focus:ring-amber-500/10 text-sm font-bold py-4.5 transition-all outline-none border border-gray-100 focus:border-amber-500" placeholder="Parent Company Name">
                        </div>
                    </div>

                    <!-- Region -->
                    <div class="md:col-span-1">
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-3 ml-1">Operations Area</label>
                        <select name="region" class="block w-full border-transparent bg-gray-50 rounded-lg focus:bg-white focus:ring-4 focus:ring-blue-500/10 text-sm font-bold py-4.5 transition-all border border-gray-100 focus:border-blue-500 outline-none cursor-pointer appearance-none px-6">
                            <option value="Local" {% if client.region == 'Local' %}selected{% endif %}>Local</option>
                            <option value="Global" {% if client.region == 'Global' %}selected{% endif %}>Global</option>
                        </select>
                    </div>

                    <!-- Status -->
                    <div class="md:col-span-1">
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-3 ml-1">Active Status</label>
                        <select name="status" class="block w-full border-transparent bg-gray-50 rounded-lg focus:bg-white focus:ring-4 focus:ring-emerald-500/10 text-sm font-bold py-4.5 transition-all border border-gray-100 focus:border-emerald-500 outline-none cursor-pointer appearance-none px-6">
                            <option value="Active" {% if client.status == 'Active' %}selected{% endif %}>Active</option>
                            <option value="Archived" {% if client.status == 'Archived' %}selected{% endif %}>Archived</option>
                        </select>
                    </div>

                    <!-- Email -->
                    <div class="md:col-span-1">
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-3 ml-1">Digital Link (Email)</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-600 transition-colors">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                </svg>
                            </div>
                            <input type="email" name="email" value="{{ client.email|default:'' }}" class="block w-full pl-12 pr-4 border-transparent bg-gray-50 rounded-lg focus:bg-white focus:ring-4 focus:ring-indigo-500/10 text-sm font-bold py-4.5 transition-all outline-none border border-gray-100 focus:border-indigo-500" placeholder="primary@entity.com">
                        </div>
                    </div>

                    <!-- Contact Number -->
                    <div class="md:col-span-1">
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-3 ml-1">Tele-Comm Line (Optional)</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-gray-400 group-focus-within:text-emerald-600 transition-colors">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                                </svg>
                            </div>
                            <input type="text" name="contact_number" value="{{ client.contact_number|default:'' }}" class="block w-full pl-12 pr-4 border-transparent bg-gray-50 rounded-lg focus:bg-white focus:ring-4 focus:ring-emerald-500/10 text-sm font-bold py-4.5 transition-all outline-none border border-gray-100 focus:border-emerald-500" placeholder="+1 234 567 890">
                        </div>
                    </div>

                    <!-- Address -->
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-3 ml-1">Physical Coordinates (Address)</label>
                        <div class="relative group">
                            <div class="absolute top-4 left-5 pointer-events-none text-gray-400 group-focus-within:text-rose-600 transition-colors">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                            </div>
                            <textarea name="address" rows="2" class="block w-full pl-12 pr-4 border-transparent bg-gray-50 rounded-lg focus:bg-white focus:ring-4 focus:ring-rose-500/10 text-sm font-bold py-4 transition-all outline-none border border-gray-100 focus:border-rose-500" placeholder="Street, City, Country">{{ client.address|default:'' }}</textarea>
                        </div>
                    </div>

                    <!-- Profile Picture -->
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-3 ml-1">Profile Matrix (Picture)</label>
                        <div class="flex items-center gap-6 p-6 bg-gray-50 rounded-lg border border-gray-100 border-dashed border-2 group hover:border-brand-300 transition-all">
                            <!-- Preview Box -->
                            <div class="h-16 w-16 bg-white rounded-lg flex items-center justify-center overflow-hidden border border-gray-100 shadow-sm relative">
                                <template x-if="profilePreview">
                                    <img :src="profilePreview" class="h-full w-full object-cover">
                                </template>
                                <template x-if="!profilePreview">
                                    <svg class="h-8 w-8 text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                </template>
                            </div>

                            <div class="flex-1">
                                <input type="file" name="profile_picture" @change="handleFileSelect($el)" class="block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-[10px] file:font-black file:uppercase file:tracking-widest file:bg-brand-50 file:text-brand-700 hover:file:bg-brand-100 transition-all cursor-pointer">
                                <p class="mt-2 text-[9px] font-black text-gray-400 uppercase tracking-widest">JPG, PNG or GIF. Max 5MB.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pt-8 flex items-center gap-4">
                    <button type="button" @click="show = false" class="flex-1 px-8 py-5 border border-gray-100 text-gray-400 font-black text-[10px] uppercase tracking-widest rounded-lg hover:bg-gray-50 transition-all hover:text-gray-600">
                        Dismiss
                    </button>
                    <button type="submit" class="flex-[2] px-8 py-5 bg-gray-900 text-white font-black text-[10px] uppercase tracking-widest rounded-lg hover:bg-brand-600 transition-all shadow-xl shadow-gray-200 transform active:scale-95">
                        {% if client %}Verify & Update{% else %}Establish Profile{% endif %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
