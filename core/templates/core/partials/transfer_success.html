<div class="rounded-md bg-green-50 p-6 shadow-sm border border-green-200" id="success-message">
    <div class="flex flex-col items-center">
        <div class="flex-shrink-0 animate-bounce">
            <!-- Heroicon name: solid/check-circle -->
            <svg class="h-12 w-12 text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd"
                    d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                    clip-rule="evenodd" />
            </svg>
        </div>
        <div class="mt-4 text-center">
            <h3 class="text-lg font-medium text-green-800">Transfer Successful</h3>
            <div class="mt-2 text-sm text-green-700">
                <p>Transaction ID: <span class="font-bold">#{{ transaction.id }}</span></p>
                <p class="mt-1">The strict double-entry ledger has correctly posted the movements.</p>
            </div>
            <div class="mt-6">
                <!-- HTMX to reload the form gracefully without full page reload -->
                <button hx-get="{% url 'core:inter_bank_transfer' %}" hx-target="#transfer-form-container"
                    hx-swap="innerHTML"
                    class="px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-green-600 hover:bg-green-700 focus:outline-none transition-colors">
                    Make another transfer
                </button>
            </div>
        </div>
    </div>
</div>
