<div class="fixed inset-0 z-[100] flex items-end sm:items-center justify-center sm:p-4" x-data="{ importing: false, progress: 0 }">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity opacity-0" x-init="setTimeout(() => $el.classList.remove('opacity-0'), 10)"></div>

    <!-- Modal/Drawer Content -->
    <div class="relative bg-white w-full sm:max-w-2xl overflow-hidden flex flex-col rounded-t-3xl sm:rounded-lg  transition-all duration-500 transform translate-y-full sm:translate-y-0 sm:scale-95 opacity-0" 
         x-init="setTimeout(() => { $el.classList.remove('translate-y-full', 'sm:scale-95', 'opacity-0'); $el.classList.add('translate-y-0', 'sm:scale-100'); }, 50)">
        
        <!-- Mobile Drawer Handle -->
        <div class="flex justify-center pt-3 pb-1 sm:hidden">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full"></div>
        </div>

        <form hx-post="{% url 'core:client_import_process' %}" 
              hx-target="#modal-container" 
              @submit="importing = true; let interval = setInterval(() => { if(progress < 90) progress += (100-progress)/20; else clearInterval(interval) }, 200)"
              class="flex flex-col h-full">
            {% csrf_token %}
            <input type="hidden" name="b64_csv" value="{{ b64_csv }}">

            <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <div>
                    <h2 class="text-xl font-bold text-gray-900 tracking-tight">Map Client CSV Columns</h2>
                    <p class="text-xs text-gray-500 font-medium">Match your CSV columns to the required fields.</p>
                </div>
                <button type="button" onclick="document.getElementById('modal-container').innerHTML = '';" class="p-2 text-gray-400 hover:text-gray-600 hover:bg-white rounded-lg transition-all  border border-transparent hover:border-gray-200">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Progress Bar -->
            <div x-show="importing" x-transition class="px-8 py-4 bg-brand-50/50 border-b border-brand-100">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-bold text-brand-700 uppercase tracking-widest animate-pulse">Processing Client Records...</span>
                    <span class="text-[10px] font-bold text-brand-600" x-text="Math.round(progress) + '%'"></span>
                </div>
                <div class="h-1.5 w-full bg-brand-100 rounded-full overflow-hidden">
                    <div class="h-full bg-brand-600 transition-all duration-500 ease-out" :style="'width: ' + progress + '%'"></div>
                </div>
            </div>

            <div class="p-8 space-y-4 max-h-[60vh] overflow-y-auto custom-scrollbar" :class="importing ? 'opacity-50 pointer-events-none' : ''">
                {% for key, label, required in expected_fields %}
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 p-3 rounded-lg bg-gray-50/50 border border-gray-100">
                    <label class="text-sm font-bold text-gray-700 flex items-center">
                        {{ label }}
                        {% if required %}
                        <span class="ml-2 px-2 py-0.5 rounded-md bg-rose-100 text-rose-600 text-[10px] uppercase font-bold">Required</span>
                        {% else %}
                        <span class="ml-2 px-2 py-0.5 rounded-md bg-gray-200 text-gray-500 text-[10px] uppercase font-bold">Optional</span>
                        {% endif %}
                    </label>

                    <select name="map_{{ key }}" class="map-select block w-full sm:w-64 border-gray-200 rounded-lg  focus:ring-brand-500 text-sm py-2 px-3 bg-white shadow-sm" data-target="{{ key|lower }}">
                        <option value="">-- Ignore / Do not map --</option>
                        {% for item in header_samples %}
                        <option value="{{ item.header }}">{{ item.header }} {% if item.sample %}(Ex: {{ item.sample|truncatechars:20 }}){% endif %}</option>
                        {% endfor %}
                    </select>
                </div>
                {% endfor %}
            </div>

            <div class="px-8 py-6 border-t border-gray-100 bg-gray-50/50 flex justify-between items-center">
                <button type="button" onclick="document.getElementById('modal-container').innerHTML = '';" class="px-6 py-3 border border-gray-200 text-sm font-bold rounded-lg text-gray-600 bg-white hover:bg-gray-50 transition-all ">
                    Cancel
                </button>

                <button type="submit" 
                        :disabled="importing"
                        class="inline-flex items-center px-8 py-3 border border-transparent text-sm font-bold rounded-lg  shadow-brand-200 text-white bg-brand-600 hover:bg-brand-700 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    <template x-if="!importing">
                        <div class="flex items-center">
                            <svg class="mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                            </svg>
                            Process Import
                        </div>
                    </template>
                    <template x-if="importing">
                        <div class="flex items-center">
                            <svg class="animate-spin -ml-1 mr-3 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            Importing...
                        </div>
                    </template>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    setTimeout(() => {
        const selects = document.querySelectorAll('.map-select');
        selects.forEach(select => {
            const target = select.getAttribute('data-target').replace('_', ' ');
            let matched = false;

            for (let i = 0; i < select.options.length; i++) {
                const opt = select.options[i];
                if (opt.value && opt.value.toLowerCase().trim() === target.toLowerCase()) {
                    select.selectedIndex = i;
                    matched = true;
                    break;
                }
            }

            if (!matched) {
                for (let i = 0; i < select.options.length; i++) {
                    const opt = select.options[i];
                    if (opt.value && opt.value.toLowerCase().includes(target.split(' ')[0])) {
                        select.selectedIndex = i;
                        break;
                    }
                }
            }
        });
    }, 100);
</script>
