{% load humanize %}
<div id="bank-account-{{ entry.obj.id }}" class="relative h-[250px] w-full rounded-lg overflow-hidden group transition-all duration-500 shadow-2xl">

    <!-- Base Gradient Layer -->
    <div class="absolute inset-0 bg-gradient-to-br from-indigo-900 via-brand-600 to-emerald-900 transition-all duration-700"></div>

    <!-- Noise Texture Overlay -->
    <div class="absolute inset-0 opacity-20 pointer-events-none mix-blend-overlay">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <filter id="noiseFilter">
                <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
            </filter>
            <rect width="100%" height="100%" filter="url(#noiseFilter)" />
        </svg>
    </div>

    <!-- Glass Overlay -->
    <div class="absolute inset-0 bg-white/10 backdrop-blur-[2px] border border-white/20 rounded-lg"></div>

    <!-- Layout Content -->
    <div class="relative z-10 p-8 h-full flex flex-col justify-between text-white">

        <!-- Top Section: Bank Logo Style & Chip -->
        <div class="flex justify-between items-start">
            <div class="flex flex-col">
                <div class="flex items-center gap-2 mb-1">
                    <div class="w-2 h-2 rounded-lg bg-emerald-400 animate-pulse"></div>
                    <span class="text-[10px] font-black uppercase tracking-[0.3em] text-white/70">Verified Vault</span>
                </div>
                <h3 class="text-2xl font-black italic tracking-tighter leading-none uppercase">{{ entry.obj.bank_name }}</h3>
            </div>

            <!-- Deluxe Card Chip -->
            <div class="w-12 h-10 bg-gradient-to-br from-amber-200 via-amber-400 to-amber-200 rounded-lg p-1 shadow-inner relative overflow-hidden transition-transform duration-500">
                <div class="absolute inset-0 opacity-30">
                    <div class="h-full w-full grid grid-cols-3 gap-0.5">
                        <div class="border-r border-b border-black/20"></div>
                        <div class="border-r border-b border-black/20"></div>
                        <div class="border-b border-black/20"></div>
                        <div class="border-r border-b border-black/20"></div>
                        <div class="border-r border-b border-black/20"></div>
                        <div class="border-b border-black/20"></div>
                        <div class="border-r border-black/20"></div>
                        <div class="border-r border-black/20"></div>
                        <div></div>
                    </div>
                </div>
                <!-- Holographic Shine -->
                <div class="absolute -inset-full bg-gradient-to-r from-transparent via-white/40 to-transparent skew-x-12 animate-shimmer"></div>
            </div>
        </div>

        <!-- Middle: Account Number Structure -->
        <div class="mt-4">
            <div class="flex items-center gap-4 text-xl font-mono tracking-[0.2em] font-bold text-white/90">
                <span>••••</span>
                <span>••••</span>
                <span>••••</span>
                <span>{{ entry.obj.account_number|slice:"-4:"|default:"8821" }}</span>
            </div>
            <p class="text-[10px] font-black text-white/50 uppercase tracking-[0.4em] mt-2 italic">{{ entry.obj.ledger_account.name }}</p>
        </div>

        <!-- Bottom: Balance & Actions -->
        <div class="flex items-end justify-between border-t border-white/10 pt-4">
            <div class="flex flex-col">
                <span class="text-[9px] font-black text-white/60 uppercase tracking-widest mb-1">Liquid Balance</span>
                <div class="flex items-baseline gap-1.5">
                    <span class="text-3xl font-black tabular-nums">{{ entry.obj.ledger_account.currency.symbol }} {{ entry.balance_int }}</span>
                    <span class="text-xs font-bold text-emerald-300">.{{ entry.balance_decimal }}</span>
                </div>
            </div>

            <!-- Action Cluster -->
            <div class="flex gap-2 opacity-100 transition-all duration-500">
                <button hx-get="{% url 'core:bank_account_confirm_delete' entry.obj.id %}" hx-target="#modal-container" hx-swap="innerHTML" class="p-2.5 bg-rose-500/30 hover:bg-rose-500/60 rounded-lg backdrop-blur-md transition-colors border border-white/10">
                    <svg class="h-4 w-4 text-rose-100" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Decorative Corner Glow -->
    <div class="absolute -top-10 -left-10 w-40 h-40 bg-white/10 rounded-lg blur-3xl pointer-events-none"></div>
</div>

<style>
    @keyframes shimmer {
        0% {
            transform: translateX(-200%) skewX(-12deg);
        }

        100% {
            transform: translateX(200%) skewX(-12deg);
        }
    }

    .animate-shimmer {
        animation: shimmer 3s infinite;
    }
</style>
