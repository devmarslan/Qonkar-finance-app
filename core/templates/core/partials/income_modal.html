{% load widget_tweaks %}
<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm animate-in fade-in duration-300" id="income-modal" x-data @click.self="$el.remove()">
    <div class="bg-white rounded-2xl  border border-gray-100 w-full max-w-2xl overflow-hidden animate-in zoom-in-95 duration-300 flex flex-col max-h-[90vh]">
        
        <!-- Header -->
        <div class="px-8 py-5 border-b border-gray-100 flex items-center justify-between bg-white shrink-0">
            <div>
                <h3 class="text-xl font-bold text-gray-900 tracking-tight">Post Client Payment</h3>
                <p class="text-[9px] font-bold text-emerald-600 uppercase tracking-widest mt-0.5 animate-pulse">Ledger Auto-Synchronized</p>
            </div>
            <button @click="document.getElementById('income-modal').remove()" class="p-2 text-gray-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-all active:scale-95 group">
                <svg class="h-6 w-6 transform group-hover:rotate-90 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Scrollable Form Container -->
        <div class="px-8 py-6 overflow-y-auto custom-scrollbar">
            <div id="income-form-container">
                {% include 'core/partials/income_form.html' %}
            </div>
        </div>

    </div>
</div>
