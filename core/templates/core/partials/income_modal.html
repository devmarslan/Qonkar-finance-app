{% load widget_tweaks %}
<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm animate-in fade-in duration-300" id="income-modal" x-data @click.self="$el.remove()">
    <div class="bg-white rounded-lg  border border-gray-100 w-full max-w-2xl overflow-hidden animate-in zoom-in-95 duration-300 flex flex-col max-h-[90vh]">
        
        <!-- Header -->
        <div class="bg-gradient-to-br from-brand-600 to-indigo-700 px-8 py-6">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="text-xl font-bold text-white tracking-tight">Post Client Payment</h3>
                    <p class="text-brand-100 text-[10px] font-medium uppercase tracking-widest mt-1">Ledger Auto-Synchronized</p>
                </div>
                <button @click="document.getElementById('income-modal').remove()" class="text-white/80 hover:text-white transition-colors">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Scrollable Form Container -->
        <div class="px-8 py-6 overflow-y-auto custom-scrollbar">
            <div id="income-form-container">
                {% include 'core/partials/income_form.html' %}
            </div>
        </div>

    </div>
</div>
