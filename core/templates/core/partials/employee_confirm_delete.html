<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm animate-in fade-in duration-300" x-data="{ show: true }" x-show="show" x-on:keydown.escape.window="show = false">
    <!-- Modal Content -->
    <div class="relative w-full max-w-md overflow-hidden rounded-lg bg-white shadow-2xl border border-gray-100 animate-in zoom-in-95 duration-200" @click.outside="show = false">
        
        <!-- Header: Destructive Gradient -->
        <div class="bg-gradient-to-br from-rose-600 to-red-700 px-8 py-8 flex justify-between items-center relative overflow-hidden">
            <div class="absolute inset-0 opacity-10">
                <svg class="h-full w-full" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M0 0 L100 0 L100 100 L0 100 Z" fill="url(#grid-pattern)" />
                </svg>
            </div>
            <div class="relative z-10 text-center w-full">
                <div class="w-16 h-16 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center text-white mx-auto mb-4 ring-1 ring-white/30 shadow-lg">
                    <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </div>
                <h3 class="text-2xl font-bold text-white tracking-tight">De-enroll Employee?</h3>
                <p class="text-rose-100 text-[10px] font-bold uppercase tracking-widest mt-1 opacity-80">Permanent HR Record Removal</p>
            </div>
            <button @click="show = false" class="absolute right-4 top-4 p-2 bg-white/10 hover:bg-white/20 text-white rounded-lg transition-all backdrop-blur-sm border border-white/10">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="p-8 sm:p-10 text-center">
            <p class="text-gray-500 text-sm leading-relaxed mb-8">
                You are about to purge <span class="font-bold text-gray-900">{{ employee.name }}</span> from the organizational records. This action is <span class="text-rose-600 font-bold underline">irreversible</span>.
            </p>

            <div class="flex flex-col gap-3">
                <form hx-delete="{% url 'core:employee_delete' employee.pk %}" hx-target="#employee-table-container" hx-swap="outerHTML" @submit="show = false">
                    {% csrf_token %}
                    <button type="submit" class="w-full px-8 py-4 bg-rose-600 text-white font-bold text-[10px] uppercase tracking-widest rounded-lg hover:bg-rose-700 hover:scale-[1.02] active:scale-95 transition-all shadow-lg shadow-rose-200">
                        Confirm & Purge Record
                    </button>
                </form>
                <button type="button" @click="show = false" class="w-full px-8 py-4 border border-gray-200 text-gray-400 font-bold text-[10px] uppercase tracking-widest rounded-lg hover:bg-gray-50 hover:text-gray-600 transition-all">
                    Cancel Deletion
                </button>
            </div>
        </div>
    </div>
</div>
