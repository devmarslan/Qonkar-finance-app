<div class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6" x-data="{ show: true }" x-show="show" x-on:keydown.escape.window="show = false">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-md transition-opacity" x-show="show" x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-transition:leave="ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" @click="show = false"></div>

    <!-- Modal Content -->
    <div class="relative bg-white rounded-lg shadow-2xl max-w-lg w-full overflow-hidden transform transition-all border border-gray-100" x-show="show" x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95" x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100" x-transition:leave="ease-in duration-200" x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100" x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95">
        
        <div class="absolute top-0 left-0 w-full h-1 bg-rose-500"></div>

        <div class="p-8 sm:p-10">
            <div class="flex items-center justify-center w-16 h-16 bg-rose-50 rounded-2xl mb-6 mx-auto">
                <svg class="h-8 w-8 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </div>

            <h3 class="text-2xl font-bold text-gray-900 text-center tracking-tight mb-2">De-enroll Employee?</h3>
            <p class="text-sm text-gray-500 text-center font-medium px-4">
                You are about to remove <span class="font-bold text-gray-900">{{ employee.name }}</span> from the company records. This action is irreversible.
            </p>

            <div class="mt-10 flex flex-col sm:flex-row gap-3">
                <button @click="show = false" class="flex-1 px-8 py-4 bg-gray-50 text-gray-400 font-bold text-[10px] uppercase tracking-widest rounded-lg hover:bg-gray-100 transition-all">
                    Cancel Deletion
                </button>
                <form hx-delete="{% url 'core:employee_delete' employee.pk %}" hx-target="#employee-table-container" hx-swap="outerHTML" @submit="show = false" class="flex-1">
                    {% csrf_token %}
                    <button type="submit" class="w-full px-8 py-4 bg-rose-500 text-white font-bold text-[10px] uppercase tracking-widest rounded-lg hover:bg-rose-600 transition-all shadow-lg shadow-rose-200 active:scale-95">
                        Confirm & Purge
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
