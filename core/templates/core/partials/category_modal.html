<div class="fixed inset-0 z-[110] overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true" id="category-modal">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" hx-on:click="document.getElementById('category-modal').remove()"></div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
        <div class="inline-block align-bottom bg-white rounded-lg px-4 pt-5 pb-4 text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6">
            <div class="sm:flex sm:items-start">
                <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left w-full">
                    <h3 class="text-xl font-bold text-gray-900 tracking-tight" id="modal-title">
                        Add New Category
                    </h3>
                    <p class="mt-1 text-sm text-gray-500">Create a new classification for your transactions.</p>
                    <div class="mt-6">
                        <form hx-post="{% url 'core:category_create' %}" hx-target="#modal-container-stacked" class="space-y-4">
                            {% csrf_token %}
                            <input type="hidden" name="account_type" value="{{ account_type }}">

                            <div>
                                <label class="block text-sm font-bold text-gray-700 tracking-tight mb-1">Category Name</label>
                                <input type="text" name="name" required class="form-input block w-full border-gray-200 rounded-lg shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm py-3 px-4" placeholder="e.g. Office Supplies, Marketing...">
                            </div>

                            <div class="mt-8 flex flex-row-reverse gap-3">
                                <button type="submit" class="inline-flex justify-center py-2.5 px-6 border border-transparent shadow-lg text-sm font-bold rounded-lg text-white bg-brand-600 hover:bg-brand-700 focus:outline-none transition-all hover:scale-105 active:scale-95 shadow-brand-200">
                                    Create Category
                                </button>
                                <button type="button" hx-on:click="document.getElementById('category-modal').remove()" class="inline-flex justify-center py-2.5 px-6 border border-gray-300 shadow-sm text-sm font-bold rounded-lg text-gray-700 bg-white hover:bg-gray-50 focus:outline-none transition-all">
                                    Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
