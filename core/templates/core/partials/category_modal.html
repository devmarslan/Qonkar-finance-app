<div class="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm animate-in fade-in duration-300" id="category-modal">
    <div class="relative bg-white rounded-lg max-w-lg w-full overflow-hidden transform transition-all shadow-2xl border border-gray-100 animate-in zoom-in-95 duration-300">
        
        <!-- Header -->
        <div class="bg-gradient-to-br from-brand-600 to-indigo-700 px-8 py-8 sm:px-10 flex justify-between items-center relative overflow-hidden">
            <div class="absolute inset-0 opacity-10">
                <svg class="h-full w-full" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M0 0 L100 0 L100 100 L0 100 Z" fill="url(#grid-pattern)" />
                </svg>
            </div>
            <div class="relative z-10">
                <h3 class="text-2xl font-bold text-white tracking-tight">New Category</h3>
                <p class="text-indigo-100 text-[10px] font-bold uppercase tracking-widest mt-1 opacity-80">Classifying financial flows</p>
            </div>
            <button hx-on:click="document.getElementById('category-modal').remove()" class="relative z-10 p-2 bg-white/10 hover:bg-white/20 text-white rounded-lg transition-all backdrop-blur-sm border border-white/10">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="p-8 sm:p-10">
            <!-- Form -->
            <form hx-post="{% url 'core:category_create' %}" hx-target="#modal-container-stacked" class="space-y-6">
                {% csrf_token %}
                <input type="hidden" name="account_type" value="{{ account_type }}">

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Category Label (Name) *</label>
                    <input type="text" name="name" required class="block w-full border-gray-200 rounded-lg focus:border-brand-500 focus:ring-brand-500 text-sm py-3 px-4 shadow-sm transition-all" placeholder="e.g. Office Supplies, Marketing...">
                </div>

                <div class="pt-6 flex items-center gap-4 border-t border-gray-100">
                    <button type="button" hx-on:click="document.getElementById('category-modal').remove()" class="flex-1 px-8 py-4 border border-gray-200 text-gray-500 font-bold text-[10px] uppercase tracking-widest rounded-lg hover:bg-gray-50 transition-all">
                        Cancel
                    </button>
                    <button type="submit" class="flex-[2] px-8 py-4 bg-gradient-to-r from-brand-600 to-indigo-600 text-white font-bold text-[10px] uppercase tracking-widest rounded-lg hover:scale-[1.02] active:scale-95 transition-all shadow-lg shadow-brand-200">
                        Create Classification
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
