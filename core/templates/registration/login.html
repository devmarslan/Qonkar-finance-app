{% extends 'core/base.html' %}

{% block header_title %}Sign In{% endblock %}

{% block content %}
<style>
    .login-container {
        min-height: 100vh;
        background: #020617; /* Dark tech background */
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 50;
        overflow: hidden;
    }

    #particles-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
    }

    .glass-card {
        background: rgba(15, 23, 42, 0.6); /* Slightly darker for contrast on dark background */
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        border-radius: 32px;
        width: 100%;
        max-width: 440px;
        padding: 3rem 2.5rem;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        position: relative;
        z-index: 10;
    }

    .glass-card:hover {
        box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.12);
    }

    .input-group {
        position: relative;
        margin-bottom: 1.5rem;
    }

    .input-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        pointer-events: none;
        transition: color 0.2s ease;
    }

    .input-field {
        width: 100%;
        padding: 0.875rem 1rem 0.875rem 3rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1.5px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        font-size: 0.95rem;
        color: #e2e8f0;
        transition: all 0.2s ease;
        outline: none;
    }

    .input-field::placeholder {
        color: rgba(148, 163, 184, 0.6);
    }

    .input-field:focus {
        background: rgba(255, 255, 255, 0.08);
        border-color: #22c55e;
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2);
    }

    .input-field:focus + .input-icon {
        color: #22c55e;
    }

    .login-button {
        width: 100%;
        padding: 0.875rem;
        background: #22c55e; /* Brighter for dark theme */
        color: white;
        border-radius: 12px;
        font-weight: 800;
        font-size: 1rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.3);
    }

    .login-button:hover {
        background: #15803d;
        transform: translateY(-1px);
        box-shadow: 0 12px 20px -3px rgba(22, 163, 74, 0.3);
    }

    .login-button:active {
        transform: translateY(0);
    }

    .brand-logo {
        width: 64px;
        height: 64px;
        background: #22c55e;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        box-shadow: 0 10px 20px -5px rgba(34, 197, 94, 0.4);
        font-size: 2rem;
        font-weight: 900;
        color: white;
    }

    .error-shake {
        animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes shake {
        10%, 90% { transform: translate3d(-1px, 0, 0); }
        20%, 80% { transform: translate3d(2px, 0, 0); }
        30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
        40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    .decorative-circle {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        z-index: -1;
        opacity: 0.5;
    }

    .circle-1 {
        width: 300px;
        height: 300px;
        background: #dcfce7;
        top: -100px;
        left: -100px;
    }

    .circle-2 {
        width: 400px;
        height: 400px;
        background: #f0fdf4;
        bottom: -150px;
        right: -150px;
    }
</style>

<div class="login-container">
    <canvas id="particles-canvas"></canvas>

    <div class="glass-card {% if form.errors %}error-shake{% endif %}">
        <div class="text-center mb-10">
            <div class="brand-logo">Q</div>
            <h2 class="text-3xl font-bold text-white tracking-tight">Security Portal</h2>
            <p class="text-slate-400 mt-2 font-medium">Internal Management Access Only</p>
        </div>

        {% if form.errors %}
        <div class="mb-8 p-4 bg-rose-500/10 border border-rose-500/20 rounded-xl flex items-center">
            <svg class="w-5 h-5 text-rose-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="text-sm text-rose-200 font-bold">Authentication failed</p>
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="input-group">
                <input id="id_username" name="username" type="text" autocomplete="username" required
                    class="input-field" placeholder="Access ID">
                <div class="input-icon">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
            </div>

            <div class="input-group">
                <input id="id_password" name="password" type="password" autocomplete="current-password" required
                    class="input-field" placeholder="Secret Key">
                <div class="input-icon">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
            </div>

            <div class="flex items-center justify-between mb-8">
                <label class="flex items-center cursor-pointer group">
                    <input type="checkbox" class="w-4 h-4 rounded text-brand-600 focus:ring-brand-500 border-slate-700 bg-slate-800">
                    <span class="ml-2 text-sm text-slate-400 font-medium group-hover:text-slate-200 transition-colors">Keep secure session</span>
                </label>
                <a href="#" class="text-sm text-brand-500 font-bold hover:text-brand-400 transition-colors">System recovery?</a>
            </div>

            <button type="submit" class="login-button">
                Authorize Access
            </button>
            <input type="hidden" name="next" value="{{ next|default:'/core/dashboard/' }}" />
        </form>

        <div class="mt-12 text-center">
            <div class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.3em] mb-4">Encryption Layer Active</div>
            <div class="inline-flex items-center px-4 py-2 bg-slate-800/40 border border-white/5 rounded-full">
                <div class="w-4 h-4 bg-brand-500 rounded-sm flex items-center justify-center text-[10px] text-white font-bold mr-2">Q</div>
                <span class="text-xs font-bold text-slate-300">Qonkar <span class="text-brand-500 ml-1">Systems</span></span>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = [];
        const particleCount = 100;
        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2 + 1
            });
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(34, 197, 94, 0.5)';
        ctx.strokeStyle = 'rgba(34, 197, 94, 0.1)';

        particles.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;

            if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
            if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();

            for (let j = i + 1; j < particles.length; j++) {
                const p2 = particles[j];
                const dx = p.x - p2.x;
                const dy = p.y - p2.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 150) {
                    ctx.lineWidth = 1 - dist / 150;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
            }
        });
        requestAnimationFrame(animate);
    }

    init();
    animate();

    window.addEventListener('resize', init);
</script>
{% endblock %}
