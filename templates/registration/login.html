{% extends 'core/base.html' %}

{% block header_title %}Sign In{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white shadow-xl rounded-lg overflow-hidden border border-gray-100">
        <div class="px-4 py-5 sm:p-6">
            <h3 class="text-lg leading-6 font-medium text-gray-900 text-center mb-6">
                Sign in to your account
            </h3>

            {% if form.errors %}
            <div class="rounded-md bg-red-50 p-4 mb-4">
                <p class="text-sm text-red-700">Your username and password didn't match. Please try again.</p>
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700">Username</label>
                    <div class="mt-1">
                        <input id="id_username" name="username" type="text" autocomplete="username" required
                            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm">
                    </div>
                </div>

                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700">Password</label>
                    <div class="mt-1">
                        <input id="id_password" name="password" type="password" autocomplete="current-password" required
                            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="text-sm">
                        <span class="font-medium text-brand-600">
                            Superuser: admin / admin
                        </span>
                    </div>
                </div>

                <div>
                    <button type="submit"
                        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors">
                        Sign in
                    </button>
                    <input type="hidden" name="next" value="{{ next|default:'/core/dashboard/' }}" />
                </div>
            </form>
        </div>
    </div>

    <!-- Powered By -->
    <div class="mt-8 text-center text-sm">
        <div class="text-gray-400 mb-1">Powered By</div>
        <div class="font-bold text-gray-900 inline-flex items-center justify-center">
            <div class="w-5 h-5 bg-brand-500 rounded flex items-center justify-center mr-2 text-[10px] text-white">Q</div>
            Qonkar
        </div>
    </div>
</div>
{% endblock %}
